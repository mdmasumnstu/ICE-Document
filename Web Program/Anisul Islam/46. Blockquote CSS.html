<!doctype html>
<html lang="en">
    <head>
        <title>
            Blockquote CSS
        </title>
        <style>
            blockquote{
                margin-left: 1;
            }
        </style>
    </head>
    <body>
        <!--Blockquote using CSS-->

        He said, <blockquote>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Voluptatibus ipsum id sint est, saepe eius ea aliquam ut quod voluptate!</blockquote>
    </body>
</html>
